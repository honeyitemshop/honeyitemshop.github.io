baseURL = "https://honeyitemshop.github.io/"
languageCode = "ko-kr"
title = "honeyitemshop 쇼핑 블로그"
theme = "PaperMod"

enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false
summaryLength = 35

[pagination]
pagerSize = 12

[outputs]
home = ["HTML", "RSS", "JSON"]

[markup]
	[markup.goldmark]
		[markup.goldmark.renderer]
			unsafe = true

[minify]
disableXML = false
minifyOutput = true

[sitemap]
changefreq = "daily"
priority = 0.7
filename = "sitemap.xml"

[permalinks]
posts = "/posts/:slug/"

[params]
defaultTheme = "auto"
disableThemeToggle = false
ShowShareButtons = true
ShowReadingTime = true
ShowPostNavLinks = true
ShowBreadCrumbs = true
ShowCodeCopyButtons = true
ShowToc = true
TocOpen = false
env = "production"
description = "주방, 욕실, 수납 등 실용적인 생활용품을 소개하는 전문 쇼핑 블로그입니다. 합리적인 가격과 높은 품질의 홈 리빙 아이템을 매일 추천합니다."
keywords = ["생활용품", "주방용품", "욕실용품", "수납정리", "홈리빙", "실용쇼핑"]
images = ["/images/og-default.webp"]

# Search engine verification (set only when needed)
googleSiteVerification = ""
naverSiteVerification = ""
bingSiteVerification = ""
yandexSiteVerification = ""

[params.homeInfoParams]
Title = "스마트한 생활용품 쇼핑, 허니아이템샵"
Content = "허니아이템샵에서는 주방, 욕실, 수납 등 일상에 꼭 필요한 생활용품을 엄선하여 소개합니다. 실용적이고 트렌디한 아이템으로 집안 곳곳을 더욱 편리하게 만들어보세요. 매일 새로운 추천 상품과 꿀팁을 만나보실 수 있습니다."

[params.fuseOpts]
isCaseSensitive = false
shouldSort = true
location = 0
distance = 1000
threshold = 0.4
minMatchCharLength = 2
keys = ["title", "permalink", "summary", "content"]

[[menu.main]]
identifier = "search"
name = "Search"
url = "/search/"
weight = 5

[[menu.main]]
identifier = "posts"
name = "Posts"
url = "/posts/"
weight = 10

[[menu.main]]
identifier = "categories"
name = "Categories"
url = "/categories/"
weight = 20

[[menu.main]]
identifier = "tags"
name = "Tags"
url = "/tags/"
weight = 30
